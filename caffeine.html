<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caffeine Decay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&family=Space+Mono:wght@400;700&family=Doto:wght@100..900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3"></script>
  <style>
    /* ============================================
       Tokens
       ============================================ */
    :root {
      --font-display: "Doto", "Space Mono", monospace;
      --font-body: "Space Grotesk", "DM Sans", system-ui, sans-serif;
      --font-mono: "Space Mono", "JetBrains Mono", "SF Mono", monospace;

      --display-xl: 72px;
      --display-lg: 48px;
      --heading: 24px;
      --subheading: 18px;
      --body: 16px;
      --body-sm: 14px;
      --caption: 12px;
      --label: 11px;

      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      --space-2xl: 48px;
      --space-3xl: 64px;

      --ease: cubic-bezier(0.25, 0.1, 0.25, 1);

      /* Light mode */
      --black: #F5F5F5;
      --surface: #FFFFFF;
      --surface-raised: #F0F0F0;
      --border: #E8E8E8;
      --border-visible: #CCCCCC;
      --text-disabled: #999999;
      --text-secondary: #666666;
      --text-primary: #1A1A1A;
      --text-display: #000000;
      --accent: #D71921;
      --accent-subtle: rgba(215, 25, 33, 0.1);
      --warning: #D4A843;
      --success: #4A9E5C;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --black: #000000;
        --surface: #111111;
        --surface-raised: #1A1A1A;
        --border: #222222;
        --border-visible: #333333;
        --text-disabled: #666666;
        --text-secondary: #999999;
        --text-primary: #E8E8E8;
        --text-display: #FFFFFF;
      }
    }

    /* ============================================
       Reset
       ============================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: var(--body);
      line-height: 1.5;
      background: var(--black);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ============================================
       Layout
       ============================================ */
    .container {
      max-width: 1080px;
      margin: 0 auto;
      padding: var(--space-3xl) var(--space-lg);
    }

    @media (max-width: 640px) {
      .container {
        padding: var(--space-2xl) var(--space-md);
      }
    }

    /* Page title — tertiary label */
    .page-title {
      font-family: var(--font-mono);
      font-size: var(--label);
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-disabled);
      margin-bottom: var(--space-3xl);
    }

    .page-title a {
      color: var(--text-disabled);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      transition: color 200ms var(--ease);
    }

    .page-title a:hover {
      color: var(--text-secondary);
    }

    /* ============================================
       Primary layer — Caffeine readout
       ============================================ */
    .hero-readout {
      margin-bottom: var(--space-3xl);
    }

    .hero-label {
      font-family: var(--font-mono);
      font-size: var(--label);
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
      margin-bottom: var(--space-sm);
    }

    .hero-value {
      display: flex;
      align-items: baseline;
      gap: var(--space-sm);
    }

    .hero-value .number {
      font-family: var(--font-display);
      font-size: clamp(48px, 10vw, var(--display-xl));
      font-weight: 400;
      color: var(--text-display);
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .hero-value .unit {
      font-family: var(--font-mono);
      font-size: var(--label);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
    }

    /* ============================================
       Two-column layout
       ============================================ */
    .layout {
      display: grid;
      grid-template-columns: 1fr 1.5fr;
      gap: var(--space-2xl);
      align-items: start;
    }

    @media (max-width: 768px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }

    /* ============================================
       Left panel — Add drink
       ============================================ */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: var(--space-lg);
    }

    .panel-title {
      font-family: var(--font-mono);
      font-size: var(--label);
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
      margin-bottom: var(--space-lg);
    }

    /* Presets */
    .presets {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: var(--space-lg);
    }

    .preset-btn {
      font-family: var(--font-mono);
      font-size: var(--caption);
      letter-spacing: 0.02em;
      padding: 6px 12px;
      border: 1px solid var(--border-visible);
      border-radius: 999px;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 200ms var(--ease);
    }

    .preset-btn:hover {
      color: var(--text-primary);
      border-color: var(--text-primary);
    }

    .preset-btn.active {
      color: var(--text-display);
      border-color: var(--text-display);
      background: var(--surface-raised);
    }

    /* Form */
    .form-group {
      margin-bottom: var(--space-md);
    }

    .form-group label {
      display: block;
      font-family: var(--font-mono);
      font-size: var(--label);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
      margin-bottom: var(--space-xs);
    }

    .form-group input,
    .form-group select {
      width: 100%;
      font-family: var(--font-mono);
      font-size: var(--body-sm);
      padding: 10px 0;
      border: none;
      border-bottom: 1px solid var(--border-visible);
      border-radius: 0;
      background: transparent;
      color: var(--text-primary);
      outline: none;
      transition: border-color 200ms var(--ease);
    }

    .form-group input:focus {
      border-bottom-color: var(--text-primary);
    }

    .form-group input::placeholder {
      color: var(--text-disabled);
    }

    .add-btn {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      width: 100%;
      padding: 12px 24px;
      border: none;
      border-radius: 999px;
      background: var(--text-display);
      color: var(--black);
      cursor: pointer;
      transition: opacity 200ms var(--ease);
      margin-top: var(--space-sm);
    }

    .add-btn:hover {
      opacity: 0.85;
    }

    /* Drink log */
    .drink-log {
      margin-top: var(--space-lg);
    }

    .drink-log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-md);
    }

    .drink-log-header h3 {
      font-family: var(--font-mono);
      font-size: var(--label);
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
    }

    .clear-btn {
      font-family: var(--font-mono);
      font-size: var(--label);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 4px 12px;
      border: 1px solid var(--border-visible);
      border-radius: 999px;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 200ms var(--ease);
    }

    .clear-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .drink-log ul {
      list-style: none;
    }

    .drink-log li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .drink-log li:last-child {
      border-bottom: none;
    }

    .drink-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .drink-name {
      font-family: var(--font-body);
      font-size: var(--body-sm);
      font-weight: 400;
      color: var(--text-primary);
    }

    .drink-meta {
      font-family: var(--font-mono);
      font-size: var(--caption);
      color: var(--text-secondary);
    }

    .remove-btn {
      font-family: var(--font-mono);
      font-size: var(--label);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: transparent;
      color: var(--text-disabled);
      cursor: pointer;
      transition: all 200ms var(--ease);
    }

    .remove-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .empty-log {
      font-family: var(--font-mono);
      font-size: var(--caption);
      color: var(--text-disabled);
      padding: var(--space-sm) 0;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* ============================================
       Right panel — Chart
       ============================================ */
    .chart-panel {
      position: sticky;
      top: var(--space-lg);
    }

    .chart-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: var(--space-lg);
      height: 420px;
    }

    .chart-container canvas {
      width: 100% !important;
      height: 100% !important;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="page-title"><a href="/">Hiroaki Hayashi</a> / Caffeine Decay</div>

    <div class="hero-readout">
      <div class="hero-label">Current Caffeine</div>
      <div class="hero-value">
        <span class="number" id="current-mg">0</span>
        <span class="unit">mg</span>
      </div>
    </div>

    <div class="layout">
      <!-- Left: Drink Input -->
      <div class="panel">
        <div class="panel-title">Add a drink</div>

        <div class="presets" id="presets"></div>

        <form id="drink-form">
          <div class="form-group">
            <label for="drink-name">Drink</label>
            <input type="text" id="drink-name" placeholder="e.g. Espresso" required>
          </div>
          <div class="form-group">
            <label for="drink-grams">Bean weight (g)</label>
            <input type="number" id="drink-grams" min="1" max="100" placeholder="15" step="0.1">
          </div>
          <div class="form-group">
            <label for="drink-mg">Caffeine (mg)</label>
            <input type="number" id="drink-mg" min="1" max="1000" placeholder="150" required>
          </div>
          <div class="form-group">
            <label for="drink-time">Time</label>
            <input type="time" id="drink-time" required>
          </div>
          <button type="submit" class="add-btn">Add Drink</button>
        </form>

        <div class="drink-log">
          <div class="drink-log-header">
            <h3>Today's drinks</h3>
            <button class="clear-btn" id="clear-all" style="display:none">Clear</button>
          </div>
          <ul id="drink-log"></ul>
        </div>
      </div>

      <!-- Right: Chart -->
      <div class="chart-panel">
        <div class="chart-container">
          <canvas id="chart"></canvas>
        </div>
      </div>
    </div>
  </div>

  <script>
    // --- Constants ---
    const HALF_LIFE_HOURS = 5;
    const SLEEP_SAFE_MG = 50;
    const CAFFEINE_PER_GRAM = 12; // ~12 mg caffeine per gram of coffee beans (brewed)
    const PRESETS = [
      { name: 'Double-shot Espresso', mg: 150 },
      { name: 'Cappuccino', mg: 150 },
      { name: 'Latte', mg: 150 },
      { name: 'Pourover', mg: 180, grams: 15 },
      { name: 'Green Tea', mg: 30 },
      { name: 'Black Tea', mg: 50 },
    ];
    const STORAGE_KEY = 'caffeine-decay-drinks';

    // --- Theme-aware chart colors ---
    function getChartColors() {
      const style = getComputedStyle(document.documentElement);
      return {
        line: style.getPropertyValue('--text-display').trim(),
        fill: 'transparent',
        grid: style.getPropertyValue('--border').trim(),
        tick: style.getPropertyValue('--text-secondary').trim(),
        annotation: style.getPropertyValue('--text-disabled').trim(),
        annotationBorder: style.getPropertyValue('--border-visible').trim(),
        tooltip: style.getPropertyValue('--surface').trim(),
        tooltipText: style.getPropertyValue('--text-primary').trim(),
        accent: style.getPropertyValue('--accent').trim(),
        sleepLine: style.getPropertyValue('--border-visible').trim(),
      };
    }

    // --- State ---
    let drinks = loadDrinks();

    // --- DOM refs ---
    const form = document.getElementById('drink-form');
    const nameInput = document.getElementById('drink-name');
    const gramsInput = document.getElementById('drink-grams');
    const mgInput = document.getElementById('drink-mg');
    const timeInput = document.getElementById('drink-time');
    const drinkLog = document.getElementById('drink-log');
    const clearAllBtn = document.getElementById('clear-all');
    const currentMgEl = document.getElementById('current-mg');
    const presetsEl = document.getElementById('presets');

    // --- Grams → mg auto-calc ---
    gramsInput.addEventListener('input', () => {
      const g = parseFloat(gramsInput.value);
      if (g > 0) {
        mgInput.value = Math.round(g * CAFFEINE_PER_GRAM);
      }
    });

    // --- Init ---
    setDefaultTime();
    renderPresets();
    renderDrinkLog();
    const chart = initChart();
    updateChart();
    setInterval(updateChart, 60000);

    // --- Presets ---
    function renderPresets() {
      presetsEl.innerHTML = '';
      PRESETS.forEach((preset) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'preset-btn';
        btn.textContent = preset.name;
        btn.addEventListener('click', () => {
          document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          nameInput.value = preset.name;
          mgInput.value = preset.mg;
          gramsInput.value = preset.grams || '';
        });
        presetsEl.appendChild(btn);
      });
    }

    // --- Time helpers ---
    function setDefaultTime() {
      const now = new Date();
      const hh = String(now.getHours()).padStart(2, '0');
      const mm = String(now.getMinutes()).padStart(2, '0');
      timeInput.value = `${hh}:${mm}`;
    }

    function timeFromInput() {
      const [hour, minute] = timeInput.value.split(':').map(Number);
      const d = new Date();
      d.setHours(hour, minute, 0, 0);
      return d;
    }

    function formatTime(date) {
      let h = date.getHours();
      const m = date.getMinutes();
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      return `${h}:${m.toString().padStart(2, '0')} ${ampm}`;
    }

    function formatHourLabel(hourDecimal) {
      const totalMinutes = Math.round(hourDecimal * 60);
      let h = Math.floor(totalMinutes / 60) % 24;
      const m = totalMinutes % 60;
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      if (m === 0) return `${h} ${ampm}`;
      return `${h}:${m.toString().padStart(2, '0')} ${ampm}`;
    }

    // --- Caffeine math ---
    function caffeineAtTime(drinks, targetTime) {
      let total = 0;
      for (const drink of drinks) {
        const elapsed = (targetTime - new Date(drink.time)) / (1000 * 60 * 60);
        if (elapsed < 0) continue;
        total += drink.mg * Math.pow(0.5, elapsed / HALF_LIFE_HOURS);
      }
      return total;
    }

    function generateChartData() {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const step = 0.25;
      const labels = [];
      const data = [];

      for (let h = 0; h <= 24; h += step) {
        const t = new Date(today.getTime() + h * 3600000);
        labels.push(h);
        data.push(Math.max(0, caffeineAtTime(drinks, t)));
      }
      return { labels, data };
    }

    // --- Chart ---
    function nowHourDecimal() {
      const now = new Date();
      return now.getHours() + now.getMinutes() / 60;
    }

    function drinkAnnotations() {
      const colors = getChartColors();
      const annotations = {};
      drinks.forEach((drink, i) => {
        const d = new Date(drink.time);
        const h = d.getHours() + d.getMinutes() / 60;
        annotations[`drink${i}`] = {
          type: 'line',
          xMin: h,
          xMax: h,
          borderColor: colors.annotationBorder,
          borderWidth: 1,
          borderDash: [3, 3],
          label: {
            display: true,
            content: drink.name,
            position: 'start',
            font: { size: 10, family: '"Space Mono", monospace' },
            color: colors.annotation,
            backgroundColor: 'transparent',
          }
        };
      });
      return annotations;
    }

    function initChart() {
      const ctx = document.getElementById('chart').getContext('2d');
      const colors = getChartColors();
      return new Chart(ctx, {
        type: 'line',
        data: {
          labels: [],
          datasets: [{
            data: [],
            borderColor: colors.line,
            backgroundColor: 'transparent',
            fill: false,
            tension: 0,
            pointRadius: 0,
            borderWidth: 1.5,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: { duration: 300, easing: 'easeOutQuart' },
          interaction: {
            intersect: false,
            mode: 'index',
          },
          scales: {
            x: {
              type: 'linear',
              min: 0,
              max: 24,
              grid: { display: false },
              border: { color: colors.grid },
              ticks: {
                stepSize: 3,
                font: { family: '"Space Mono", monospace', size: 10 },
                color: colors.tick,
                callback: v => formatHourLabel(v),
              },
            },
            y: {
              beginAtZero: true,
              grid: { color: colors.grid, drawTicks: false },
              border: { display: false },
              ticks: {
                font: { family: '"Space Mono", monospace', size: 10 },
                color: colors.tick,
                padding: 8,
                callback: v => v + ' mg',
              },
            }
          },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: colors.tooltip,
              titleColor: colors.tooltipText,
              bodyColor: colors.tooltipText,
              borderColor: colors.grid,
              borderWidth: 1,
              titleFont: { family: '"Space Mono", monospace', size: 11 },
              bodyFont: { family: '"Space Mono", monospace', size: 11 },
              cornerRadius: 4,
              padding: 10,
              callbacks: {
                title: (items) => formatHourLabel(items[0].parsed.x),
                label: (ctx) => Math.round(ctx.parsed.y) + ' mg',
              }
            },
            annotation: {
              annotations: {
                nowLine: {
                  type: 'line',
                  xMin: nowHourDecimal(),
                  xMax: nowHourDecimal(),
                  borderColor: colors.annotation,
                  borderWidth: 1,
                  borderDash: [4, 3],
                  label: {
                    display: true,
                    content: 'NOW',
                    position: 'end',
                    font: { size: 10, family: '"Space Mono", monospace', weight: '400' },
                    color: colors.tick,
                    backgroundColor: 'transparent',
                  }
                },
                sleepSafe: {
                  type: 'line',
                  yMin: SLEEP_SAFE_MG,
                  yMax: SLEEP_SAFE_MG,
                  borderColor: colors.sleepLine,
                  borderWidth: 1,
                  borderDash: [4, 4],
                  label: {
                    display: true,
                    content: 'SLEEP-SAFE 50 MG',
                    position: 'end',
                    font: { size: 10, family: '"Space Mono", monospace' },
                    color: colors.annotation,
                    backgroundColor: 'transparent',
                  }
                }
              }
            }
          }
        }
      });
    }

    function updateChart() {
      const { labels, data } = generateChartData();
      const colors = getChartColors();
      chart.data.labels = labels;
      chart.data.datasets[0].data = data;
      chart.data.datasets[0].borderColor = colors.line;

      const now = nowHourDecimal();
      chart.options.plugins.annotation.annotations = {
        nowLine: {
          type: 'line',
          xMin: now,
          xMax: now,
          borderColor: colors.annotation,
          borderWidth: 1,
          borderDash: [4, 3],
          label: {
            display: true,
            content: 'NOW',
            position: 'end',
            font: { size: 10, family: '"Space Mono", monospace', weight: '400' },
            color: colors.tick,
            backgroundColor: 'transparent',
          }
        },
        sleepSafe: {
          type: 'line',
          yMin: SLEEP_SAFE_MG,
          yMax: SLEEP_SAFE_MG,
          borderColor: colors.sleepLine,
          borderWidth: 1,
          borderDash: [4, 4],
          label: {
            display: true,
            content: 'SLEEP-SAFE 50 MG',
            position: 'end',
            font: { size: 10, family: '"Space Mono", monospace' },
            color: colors.annotation,
            backgroundColor: 'transparent',
          }
        },
        ...drinkAnnotations(),
      };

      chart.update();

      const currentCaffeine = caffeineAtTime(drinks, new Date());
      currentMgEl.textContent = Math.round(currentCaffeine);
    }

    // --- Form ---
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const name = nameInput.value.trim();
      const mg = parseInt(mgInput.value);
      if (!name || !mg) return;

      const time = timeFromInput();
      drinks.push({
        id: crypto.randomUUID(),
        name,
        mg,
        time: time.toISOString(),
      });

      saveDrinks();
      renderDrinkLog();
      updateChart();

      nameInput.value = '';
      gramsInput.value = '';
      mgInput.value = '';
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
      setDefaultTime();
    });

    // --- Drink log ---
    function renderDrinkLog() {
      clearAllBtn.style.display = drinks.length > 0 ? 'block' : 'none';

      if (drinks.length === 0) {
        drinkLog.innerHTML = '<li class="empty-log">[No drinks recorded]</li>';
        return;
      }

      const sorted = [...drinks].sort((a, b) => new Date(a.time) - new Date(b.time));

      drinkLog.innerHTML = '';
      sorted.forEach(drink => {
        const li = document.createElement('li');
        li.innerHTML = `
          <div class="drink-info">
            <span class="drink-name">${escapeHtml(drink.name)}</span>
            <span class="drink-meta">${drink.mg} mg · ${formatTime(new Date(drink.time))}</span>
          </div>
          <button class="remove-btn" data-id="${drink.id}">Remove</button>
        `;
        drinkLog.appendChild(li);
      });

      drinkLog.querySelectorAll('.remove-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          drinks = drinks.filter(d => d.id !== btn.dataset.id);
          saveDrinks();
          renderDrinkLog();
          updateChart();
        });
      });
    }

    clearAllBtn.addEventListener('click', () => {
      drinks = [];
      saveDrinks();
      renderDrinkLog();
      updateChart();
    });

    // --- Persistence ---
    function saveDrinks() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(drinks));
    }

    function loadDrinks() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (!stored) return [];
        const parsed = JSON.parse(stored);
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        return parsed.filter(d => new Date(d.time) >= today);
      } catch {
        return [];
      }
    }

    // --- Utils ---
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
